<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三叶草加载动画 · 本地自包含版</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .card {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 2rem 2.5rem;
            text-align: center;
            border: 1px solid #3a3a6a;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
        }
        h2 {
            color: #e0e0ff;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .clover-loader {
            display: inline-block;
            width: 80px;
            height: 80px;
            position: relative;
            animation: rotate 1.8s linear infinite;
        }
        .clover-loader .leaf {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #b4a5d5;
            border-radius: 50% 0 50% 0;
            transform: rotate(45deg);
            animation: pulse 1.2s ease-in-out infinite alternate;
        }

        .leaf1 { top: 0; left: 20px; transform-origin: 20px 20px; animation-delay: -0.3s; }
        .leaf2 { top: 20px; right: 0; transform-origin: 20px 20px; animation-delay: -0.15s; }
        .leaf3 { bottom: 0; left: 20px; transform-origin: 20px 20px; animation-delay: 0s; }
        .leaf4 { top: 20px; left: 0; transform-origin: 20px 20px; animation-delay: -0.45s; }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8) rotate(45deg); }
            100% { opacity: 1; transform: scale(1.1) rotate(45deg); }
        }
        .note {
            color: #8a7aa9;
            margin-top: 1.8rem;
            font-size: 0.9rem;
        }
        .note a {
            color: #b8a8e0;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>✨ 三叶草旋转动画 ✨</h2>
        <div class="clover-loader">
            <div class="leaf leaf1"></div>
            <div class="leaf leaf2"></div>
            <div class="leaf leaf3"></div>
            <div class="leaf leaf4"></div>
        </div>
        <div class="note">
            🍀 纯 CSS + SVG 实现 | 无需网络即可运行 | 颜色/大小可随意修改
        </div>
    </div>
</body>
</html>
