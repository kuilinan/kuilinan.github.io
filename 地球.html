    <style>

        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        pre {
            margin: 0;
            padding: 10px;
            color: #0f0;          /* 绿色文字，与原风格一致 */
            overflow-x: auto;     /* 如果地球太宽，可以横向滚动，不会破坏形状 */

            font-family: monospace;
            font-size: 14px;      /* 固定较小字体，避免占满全屏 */
        }
        /* 在宽屏上稍微增大字体，但限制最大 */
        @media (min-width: 1200px) {
            pre {
                font-size: 18px;
            }
        }
    </style>
