<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1KB 旋转地球 - 自动刷新版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: auto;
            height: 90vh;          /* 横向显示：高度占满大部分视口，宽度自动保持正方形 */
            max-width: 95vw;
            background: black;
            border-radius: 0;
        }
        /* 可选：在角落显示刷新提示 */
        .info {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .refresh-note {
            position: fixed;
            bottom: 12px;
            right: 12px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
