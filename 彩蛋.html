<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩蛋 · 小径分岔的花园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a1a;
            color: #e0e0ff;
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(20, 20, 40, 0.8);
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
            padding: 2rem 2rem;
            backdrop-filter: blur(4px);
            border: 1px solid #3a3a6a;
        }
        .page-header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #5a4f7c;
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #c0b0ff, #6b4e9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .back-home {
            background: #2a2a4a;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #d0c0ff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid #6b4e9e;
        }
        .back-home:hover {
            background: #6b4e9e;
            color: white;
        }
        .egg-grid {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            margin: 2rem 0;
        }
        .egg-card {
            background: #15152a;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #3a3a6a;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .egg-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px -12px rgba(107,78,158,0.4);
            border-color: #9b86c6;
        }
        .egg-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #d0c0ff;
            border-left: 6px solid #b8a8e0;
            padding-left: 1rem;
        }
        .egg-description {
            margin-bottom: 1.2rem;
            color: #b0b0e0;
            font-size: 0.95rem;
        }
        .egg-button {
            display: inline-block;
            background: #6b4e9e;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .egg-button:hover {
            background: #8f6bc0;
            transform: scale(1.02);
        }
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #7a6aa9;
            font-size: 0.85rem;
        }
        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .page-title { font-size: 1.8rem; }
            .egg-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">秘密彩蛋 · 魔法小屋</h1>
            <a href="index.html" class="back-home">返回花园</a>
        </div>
        <div class="egg-grid">
            <!-- 彩蛋 1：经典旋转地球 -->
            <div class="egg-card">
                <div class="egg-title">🌍 经典旋转地球</div>
                <div class="egg-description">源自 JS1K 大赛风格，绿色点阵网格，自动平滑旋转。</div>
                <a href="地球.html" target="_blank" class="egg-button">✨ 点开予以查看 ✨</a>
            </div>
            <!-- 彩蛋 2：雪花飘落 -->
            <div class="egg-card">
                <div class="egg-title">❄️ 雪花飘落</div>
                <div class="egg-description">轻量级 Canvas 雪花效果，适合放松心情。</div>
                <div class="egg-content">
                    <canvas id="snowCanvas" width="500" height="200" style="width:100%; height:auto; background:#0a0a2a; border-radius:12px;"></canvas>
                </div>
            </div>
        </div>
        <div class="footer-note">
            🔮 更多彩蛋正在孵化中 · 偶尔回来看看
        </div>
    </div>

    <!-- 雪花飘落效果 -->
    <script>
        (function() {
            const canvas = document.getElementById('snowCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = canvas.clientWidth;
            let height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            let particles = [];
            const num = 80;
            for (let i = 0; i < num; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speedY: Math.random() * 1 + 0.5,
                    speedX: Math.random() * 0.5 - 0.25
                });
            }
            function drawSnow() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#ffffff';
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if (p.y > height) {
                        p.y = 0;
                        p.x = Math.random() * width;
                    }
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                }
                requestAnimationFrame(drawSnow);
            }
            drawSnow();
            window.addEventListener('resize', () => {
                width = canvas.clientWidth;
                height = canvas.clientHeight;
                canvas.width = width;
                canvas.height = height;
            });
        })();
    </script>
</body>
</html>
