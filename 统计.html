<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计小窝 · 小径分岔的花园</title>

    <script src="data.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#fafafc; color:#1e1e2f; line-height:1.7; padding:2rem 1rem; }
        .container { max-width:800px; margin:0 auto; background:white; border-radius:28px; box-shadow:0 20px 40px -12px rgba(0,0,0,0.12); padding:2.8rem 2.5rem; }
        .page-header { margin-bottom:2.2rem; border-bottom:2px solid #f0eef5; padding-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .page-title { font-size:2.4rem; font-weight:700; background:linear-gradient(145deg,#3e3a5f,#6b4e9e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .back-home a { background:#e4daf2; padding:0.5rem 1.5rem; border-radius:40px; color:#3c3569; text-decoration:none; font-weight:500; transition:0.2s; border:1px solid #cdbde8; }
        .back-home a:hover { background:#d3c2f0; }
        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1.2rem; margin:2rem 0; }
        .stat-card { background:#f8f6ff; border-radius:24px; padding:1.5rem 1rem; text-align:center; border:1px solid #edeaf5; opacity:0; transform:translateY(20px); animation:slideUpFade 0.6s ease forwards; }
        .stat-card:nth-child(1) { animation-delay:0.1s; }
        .stat-card:nth-child(2) { animation-delay:0.2s; }
        .stat-card:nth-child(3) { animation-delay:0.3s; }
        .stat-card:nth-child(4) { animation-delay:0.4s; }
        @keyframes slideUpFade { to { opacity:1; transform:translateY(0); } }
        .stat-card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 20px 30px -10px rgba(107,78,158,0.3); background:white; }
        .stat-label { font-size:1rem; color:#6b6b8b; margin-bottom:0.5rem; }
        .stat-number { font-size:2.5rem; font-weight:800; color:#3e3a5f; line-height:1.2; letter-spacing:1px; }
        .stat-unit { font-size:0.9rem; color:#8a7aa9; }
        .run-time { font-size:1.2rem; font-weight:500; color:#6b4e9e; margin:0.5rem 0; animation:softGlow 2s infinite ease-in-out; }
        @keyframes softGlow { 0%,100%{color:#6b4e9e; text-shadow:0 0 5px rgba(107,78,158,0.2);} 50%{color:#8f7bbf; text-shadow:0 0 12px rgba(143,123,191,0.5);} }
        .post-list { margin-top:2.5rem; }
        .post-list h3 { font-size:1.5rem; color:#373356; border-left:6px solid #b8a8e0; padding-left:1rem; margin-bottom:1.2rem; }
        .post-word-item { display:flex; justify-content:space-between; padding:0.6rem 1rem; background:#faf8ff; border-radius:40px; margin-bottom:0.5rem; opacity:0; transform:translateX(-10px); animation:slideIn 0.4s ease forwards; transition:background 0.2s,transform 0.2s; }
        .post-word-item:nth-child(1) { animation-delay:0.5s; }
        .post-word-item:nth-child(2) { animation-delay:0.6s; }
        .post-word-item:nth-child(3) { animation-delay:0.7s; }
        @keyframes slideIn { to { opacity:1; transform:translateX(0); } }
        .post-word-item:hover { background:#efe8ff; transform:scale(1.01) translateX(5px); }
        .post-word-title a { text-decoration:none; color:#4a4270; font-weight:500; }
        .post-word-count { color:#7a6aa9; font-size:0.9rem; }
        .footer-note { margin-top:2rem; text-align:center; color:#7b7b9c; font-size:0.9rem; }
        .page-title::after { content:''; position:absolute; bottom:-8px; left:0; width:60px; height:4px; background:linear-gradient(90deg,#b8a8e0,#6b4e9e); border-radius:4px; animation:underlineGrow 0.8s ease-out forwards; }
        @keyframes underlineGrow { from{width:0;opacity:0;} to{width:60px;opacity:1;} }
        #busuanzi_value_site_pv { display:none; }
        @media (max-width:500px) { .stats-grid { grid-template-columns:1fr; } }

@keyframes cloverRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
@keyframes cloverPulse {
    0% { opacity: 0.3; transform: scale(0.7) rotate(45deg); }
    100% { opacity: 1; transform: scale(1.1) rotate(45deg); }
}
@keyframes cloverFadeText {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}
.loader-hidden {
    opacity: 0 !important;
    pointer-events: none !important;
}

</style>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>

<div id="pageLoader" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #fafafc; z-index: 99999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    transition: opacity 0.5s ease;
">

    <div id="cloverSpinner" style="
        width: 100px; height: 100px; position: relative;
        animation: cloverRotate 1.8s linear infinite;
    ">
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #b4a5d5; border-radius: 50% 0 50% 0;
            top: 0; left: 25px; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.3s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #a390cc; border-radius: 50% 0 50% 0;
            top: 25px; right: 0; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.15s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #c4b5e0; border-radius: 50% 0 50% 0;
            bottom: 0; left: 25px; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate 0s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #8f7bbf; border-radius: 50% 0 50% 0;
            top: 25px; left: 0; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.45s;
        "></div>
    </div>

    <p style="
        margin-top: 1.5rem; color: #7a6aa9;
        font-size: 1.1rem; font-weight: 500;
        animation: cloverFadeText 1.2s ease-in-out infinite alternate;
    ">🍀 小花园正在加载中…</p>
    <p style="
        margin-top: 0.5rem; color: #9a8ab9; font-size: 0.85rem;
    ">如果加载时间过长，请检查网络连接～</p>
</div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">📊 统计小窝</h1>
            <div class="back-home"><a href="index.html">🏡 回首页</a></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">📝 文章总数</div><div class="stat-number" id="totalPosts">0</div><div class="stat-unit">篇</div></div>
            <div class="stat-card"><div class="stat-label">🔤 总字数</div><div class="stat-number" id="totalWords">0</div><div class="stat-unit">字</div></div>
            <div class="stat-card"><div class="stat-label">⏳ 运行时长</div><div class="stat-number" id="runDays">0</div><div class="run-time" id="runDetail">计算中...</div></div>
            <div class="stat-card"><div class="stat-label">👀 总访问量</div><div class="stat-number" id="visitCount">0</div><div class="stat-unit">次</div><span id="busuanzi_value_site_pv" style="display:none;"></span></div>
        </div>
        <div class="post-list"><h3>📄 文章字数明细</h3><div id="postWordList"></div></div>
        <div class="footer-note">✨ 小花园和你一起慢慢长大 ✨</div>
    </div>
    <script src="stats.js"></script>
    <script>
        function updateBusuanzi() {
            const pvSpan = document.getElementById('busuanzi_value_site_pv');
            if (pvSpan && pvSpan.innerText) {
                document.getElementById('visitCount').innerText = pvSpan.innerText;
            } else {
                setTimeout(updateBusuanzi, 500);
            }
        }
        updateBusuanzi();
    </script>

<script>
(function() {

    var pageLoaded = false;
    var loaderTimer = null;

    function hideLoader() {
        var loader = document.getElementById('pageLoader');
        if (loader) {
            loader.classList.add('loader-hidden');
            setTimeout(function() {
                if (loader && loader.parentNode) {
                    loader.style.display = 'none';
                }
            }, 600);
        }
    }

    var scripts = document.querySelectorAll('script[src]');
    var hasExternalScripts = scripts.length > 0;

    if (hasExternalScripts) {

        loaderTimer = setTimeout(function() {

            if (!pageLoaded) {

                var failedScripts = false;
                for (var i = 0; i < scripts.length; i++) {

                    if (scripts[i].getAttribute('data-error') === 'true') {
                        failedScripts = true;
                        break;
                    }
                }

                if (failedScripts) {
                    window.location.href = '404.html?reason=network';
                } else {

                    hideLoader();
                }
            }
        }, 8000);
    } else {

        setTimeout(hideLoader, 600);
    }

    for (var i = 0; i < scripts.length; i++) {
        scripts[i].addEventListener('error', function() {
            this.setAttribute('data-error', 'true');
        });
        scripts[i].addEventListener('load', function() {
            pageLoaded = true;
            clearTimeout(loaderTimer);
            hideLoader();
        });
    }

    document.addEventListener('DOMContentLoaded', function() {

        var images = document.querySelectorAll('img');
        if (images.length === 0) {

            pageLoaded = true;
            clearTimeout(loaderTimer);
            setTimeout(hideLoader, 300);
        } else {
            var loadedCount = 0;
            var totalImages = images.length;
            for (var i = 0; i < images.length; i++) {
                if (images[i].complete) {
                    loadedCount++;
                } else {
                    images[i].addEventListener('load', function() {
                        loadedCount++;
                        if (loadedCount >= totalImages) {
                            pageLoaded = true;
                            clearTimeout(loaderTimer);
                            setTimeout(hideLoader, 300);
                        }
                    });
                    images[i].addEventListener('error', function() {
                        loadedCount++;
                        if (loadedCount >= totalImages) {
                            pageLoaded = true;
                            clearTimeout(loaderTimer);
                            setTimeout(hideLoader, 300);
                        }
                    });
                }
            }
            if (loadedCount >= totalImages) {
                pageLoaded = true;
                clearTimeout(loaderTimer);
                setTimeout(hideLoader, 300);
            }
        }
    });

    setTimeout(function() {
        if (document.getElementById('pageLoader') &&
            document.getElementById('pageLoader').style.display !== 'none') {
            hideLoader();
        }
    }, 10000);
})();
</script>

</body>
</html>
