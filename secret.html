<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密花园 · 只属于你</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#0a0a1a;color:#e0e0ff;line-height:1.7;padding:2rem 1rem;min-height:100vh;display:flex;justify-content:center;align-items:center}
        .container{max-width:800px;margin:0 auto;background:rgba(20,20,40,0.85);border-radius:32px;padding:2.5rem;border:1px solid #3a3a6a;box-shadow:0 20px 40px -12px rgba(0,0,0,0.6)}
        h1{font-size:2rem;margin-bottom:1rem;color:#d0c0ff;border-left:6px solid #b8a8e0;padding-left:1rem}
        .content{color:#e0e0ff;font-size:1.1rem}
        .content img{max-width:100%;border-radius:16px;margin:1rem 0}
        .back-link{display:inline-block;margin-top:2rem;background:#6b4e9e;color:white;padding:0.6rem 1.5rem;border-radius:40px;text-decoration:none;transition:0.2s}
        .back-link:hover{background:#8f6bc0}
        .error-msg{color:#ff6b6b;text-align:center;padding:2rem 0}

@keyframes cloverRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
@keyframes cloverPulse {
    0% { opacity: 0.3; transform: scale(0.7) rotate(45deg); }
    100% { opacity: 1; transform: scale(1.1) rotate(45deg); }
}
@keyframes cloverFadeText {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}
.loader-hidden {
    opacity: 0 !important;
    pointer-events: none !important;
}

</style>
</head>
<body>

<div id="pageLoader" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #fafafc; z-index: 99999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    transition: opacity 0.5s ease;
">

    <div id="cloverSpinner" style="
        width: 100px; height: 100px; position: relative;
        animation: cloverRotate 1.8s linear infinite;
    ">
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #b4a5d5; border-radius: 50% 0 50% 0;
            top: 0; left: 25px; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.3s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #a390cc; border-radius: 50% 0 50% 0;
            top: 25px; right: 0; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.15s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #c4b5e0; border-radius: 50% 0 50% 0;
            bottom: 0; left: 25px; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate 0s;
        "></div>
        <div style="
            position: absolute; width: 50px; height: 50px;
            background: #8f7bbf; border-radius: 50% 0 50% 0;
            top: 25px; left: 0; transform-origin: 25px 25px;
            animation: cloverPulse 1.2s ease-in-out infinite alternate -0.45s;
        "></div>
    </div>

    <p style="
        margin-top: 1.5rem; color: #7a6aa9;
        font-size: 1.1rem; font-weight: 500;
        animation: cloverFadeText 1.2s ease-in-out infinite alternate;
    ">🍀 小花园正在加载中…</p>
    <p style="
        margin-top: 0.5rem; color: #9a8ab9; font-size: 0.85rem;
    ">如果加载时间过长，请检查网络连接～</p>
</div>

    <div class="container">
        <h1>🔒 秘密花园</h1>
        <div class="content" id="secretContent">
            <p style="color:#8a7aa9;">加载中……</p>
        </div>
        <a href="彩蛋.html" class="back-link">🏠 返回彩蛋屋</a>
    </div>
    <script>
        const content = localStorage.getItem('secret_content');
        if (content) {
            document.getElementById('secretContent').innerHTML = content;
            localStorage.removeItem('secret_content');
        } else {
            document.getElementById('secretContent').innerHTML = '<p class="error-msg">⚠️ 未检测到有效内容，请从彩蛋页重新进入。</p>';
        }
    </script>

<script>
(function() {

    var pageLoaded = false;
    var loaderTimer = null;

    function hideLoader() {
        var loader = document.getElementById('pageLoader');
        if (loader) {
            loader.classList.add('loader-hidden');
            setTimeout(function() {
                if (loader && loader.parentNode) {
                    loader.style.display = 'none';
                }
            }, 600);
        }
    }

    var scripts = document.querySelectorAll('script[src]');
    var hasExternalScripts = scripts.length > 0;

    if (hasExternalScripts) {

        loaderTimer = setTimeout(function() {

            if (!pageLoaded) {

                var failedScripts = false;
                for (var i = 0; i < scripts.length; i++) {

                    if (scripts[i].getAttribute('data-error') === 'true') {
                        failedScripts = true;
                        break;
                    }
                }

                if (failedScripts) {
                    window.location.href = '404.html?reason=network';
                } else {

                    hideLoader();
                }
            }
        }, 8000);
    } else {

        setTimeout(hideLoader, 600);
    }

    for (var i = 0; i < scripts.length; i++) {
        scripts[i].addEventListener('error', function() {
            this.setAttribute('data-error', 'true');
        });
        scripts[i].addEventListener('load', function() {
            pageLoaded = true;
            clearTimeout(loaderTimer);
            hideLoader();
        });
    }

    document.addEventListener('DOMContentLoaded', function() {

        var images = document.querySelectorAll('img');
        if (images.length === 0) {

            pageLoaded = true;
            clearTimeout(loaderTimer);
            setTimeout(hideLoader, 300);
        } else {
            var loadedCount = 0;
            var totalImages = images.length;
            for (var i = 0; i < images.length; i++) {
                if (images[i].complete) {
                    loadedCount++;
                } else {
                    images[i].addEventListener('load', function() {
                        loadedCount++;
                        if (loadedCount >= totalImages) {
                            pageLoaded = true;
                            clearTimeout(loaderTimer);
                            setTimeout(hideLoader, 300);
                        }
                    });
                    images[i].addEventListener('error', function() {
                        loadedCount++;
                        if (loadedCount >= totalImages) {
                            pageLoaded = true;
                            clearTimeout(loaderTimer);
                            setTimeout(hideLoader, 300);
                        }
                    });
                }
            }
            if (loadedCount >= totalImages) {
                pageLoaded = true;
                clearTimeout(loaderTimer);
                setTimeout(hideLoader, 300);
            }
        }
    });

    setTimeout(function() {
        if (document.getElementById('pageLoader') &&
            document.getElementById('pageLoader').style.display !== 'none') {
            hideLoader();
        }
    }, 10000);
})();
</script>

</body>
</html>
